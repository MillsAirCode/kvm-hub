# Service health & restart targets. Read by api/main.py at startup.
#
# Types:
#   systemd_user_local   — local user unit (uses systemctl --user)
#   systemd_user_remote  — same, over SSH
#   docker_local         — local docker container (via sg docker -c "...")
#
# Restart paths use the same machinery; "kind: critical" containers refuse
# to restart without an explicit confirmation.

services:
  # ── Natalie (this box) ─────────────────────────────────────────────
  - id: kvm-hub
    name: KVM Hub backend
    host: natalie
    type: systemd_user_local
    unit: kvm-hub.service
    description: Dashboard API + websockets

  - id: whisper-server
    name: whisper-server
    host: natalie
    type: systemd_user_local
    unit: whisper-server.service
    description: large-v3-turbo speech-to-text on Vulkan (680M)

  # Honcho memory stack
  - id: honcho-api
    name: Honcho API
    host: natalie
    type: docker_local
    container: honcho-server-api-1
    description: Vector / message store HTTP API
  - id: honcho-deriver
    name: Honcho deriver
    host: natalie
    type: docker_local
    container: honcho-server-deriver-1
    description: Background dialectic worker
  - id: honcho-redis
    name: Honcho redis
    host: natalie
    type: docker_local
    container: honcho-server-redis-1
    kind: critical
  - id: honcho-postgres
    name: Honcho postgres
    host: natalie
    type: docker_local
    container: honcho-server-database-1
    kind: critical

  # Guacamole stack
  - id: guacamole
    name: Guacamole web
    host: natalie
    type: docker_local
    container: kvm-hub-guacamole-1
    description: Browser-based RDP / VNC / SSH
  - id: guacd
    name: guacd
    host: natalie
    type: docker_local
    container: kvm-hub-guacd-1
    description: Protocol daemon for Guacamole
  - id: guac-postgres
    name: Guacamole postgres
    host: natalie
    type: docker_local
    container: kvm-hub-postgres-1
    kind: critical

  # ── Clue (bradBigDesktop) ─────────────────────────────────────────
  - id: clue-llama
    name: llama-server (Clue)
    host: clue
    type: systemd_user_remote
    ssh_user: brad
    ssh_host: 100.106.249.30
    key_file: /home/remote/.ssh/bradBigDesktop
    unit: llama-server.service
    description: Carnice V2 27B inference

  - id: clue-hermes
    name: hermes-gateway (Clue)
    host: clue
    type: systemd_user_remote
    ssh_user: brad
    ssh_host: 100.106.249.30
    key_file: /home/remote/.ssh/bradBigDesktop
    unit: hermes-gateway.service
    description: Telegram + platform integration

  # ── Sarah (Junior) ────────────────────────────────────────────────
  - id: sarah-llama
    name: llama-server (Sarah)
    host: sarah
    type: systemd_user_remote
    ssh_user: ubimini
    ssh_host: 10.0.0.54
    key_file: /home/remote/.ssh/id_ed25519
    unit: llama-server.service
    description: Qwen 3.6 35B-A3B inference

  - id: sarah-hermes
    name: hermes-gateway (Sarah)
    host: sarah
    type: systemd_user_remote
    ssh_user: ubimini
    ssh_host: 10.0.0.54
    key_file: /home/remote/.ssh/id_ed25519
    unit: hermes-gateway.service
    description: Telegram + platform integration
